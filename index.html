<html lang="fr">
<head>

<title>Oussama &amp; Amna — 08.08.2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --blanc:#f8f6f2;
    --perle:#efeae1;
    --sable:#f4e7d6;
    --champagne:#eed9bf;
    --or:#c19a63;
    --or-clair:#d9bd93;
    --encre:#6d5a44;
    --encre-douce:#9a886f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    background:linear-gradient(180deg,#f7ecdd 0%,#efdcc4 60%,#ecd5b9 100%);
    font-family:'Cormorant Garamond',Georgia,serif;
    color:var(--encre);
    overflow:hidden;
  }
  body.ouvert{overflow:auto}
  body::after{ /* grain papier */
    content:"";position:fixed;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:multiply;z-index:90;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
  }

  /* ================= ENVELOPPE ================= */
  .voile{
    position:fixed;inset:0;z-index:100;background:#efe9df;
    display:flex;align-items:center;justify-content:center;
    transition:opacity .9s ease .35s;
  }
  .voile.parti{opacity:0;pointer-events:none;visibility:hidden;transition:opacity .9s ease .35s, visibility 0s 1.3s}
  .env{position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden}
  .env-img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;
    transition:transform 1.3s cubic-bezier(.6,.05,.3,1), opacity .9s ease .25s, filter 1.1s ease;
  }
  .ouvrant .env-img{transform:scale(1.12);opacity:0;filter:blur(3px)}

  .sceau{
    position:absolute;left:50%;top:50%;
    width:min(52vw,240px);height:min(52vw,240px);
    transform:translate(-50%,-50%);
    border:none;cursor:pointer;background:transparent;border-radius:50%;
    z-index:5;
  }
  .sceau:focus-visible{outline:2px solid var(--or);outline-offset:8px}
  .ouvrant .sceau{pointer-events:none}

  .hint{
    position:absolute;left:50%;bottom:7%;transform:translateX(-50%);
    font-family:'Jost',sans-serif;font-weight:300;
    font-size:.72rem;letter-spacing:.35em;text-transform:uppercase;
    color:#8a7a63;white-space:nowrap;z-index:5;
    padding:.55rem 1.1rem;border-radius:999px;
    background:rgba(248,246,242,.72);backdrop-filter:blur(4px);
    animation:pulse 2.6s ease-in-out infinite;
    transition:opacity .4s ease;
  }
  .ouvrant .hint{opacity:0}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}

  /* ================= HERO ARCHE ================= */
  .hero{
    min-height:100vh;min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    position:relative;padding:6vh 1.2rem 4vh;
  }
  .etoile{
    position:absolute;color:var(--or);opacity:0;font-size:.8rem;
    animation:scintille 3.4s ease-in-out infinite;
  }
  body.ouvert .etoile{opacity:.5}
  .etoile.e1{top:14%;left:14%;animation-delay:.4s}
  .etoile.e2{top:22%;right:12%;animation-delay:1.5s;font-size:.6rem}
  .etoile.e3{bottom:18%;left:18%;animation-delay:2.3s;font-size:.65rem}
  .etoile.e4{bottom:26%;right:16%;animation-delay:.9s}
  @keyframes scintille{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:.6;transform:scale(1.1)}}

  .arche{
    position:relative;
    width:min(82vw,330px);
    min-height:min(74vh,560px);
    border-radius:165px 165px 14px 14px;
    background:radial-gradient(ellipse at 50% 22%, #fdf7ec 0%, #f6e6cf 62%, #f0dcc0 100%);
    box-shadow:
      0 0 0 5px rgba(253,247,236,.8),
      0 0 0 6px var(--or-clair),
      0 0 0 12px rgba(253,247,236,.55),
      0 0 0 13px rgba(193,154,99,.55),
      0 34px 60px -28px rgba(109,90,68,.5);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:4.6rem 1.4rem 2.6rem;
  }
  .hero .arche{transform:translateY(5%) scale(.94);transition:transform 1.3s cubic-bezier(.22,1,.36,1) 1.1s}
  body.ouvert .hero .arche{transform:none}
  .hero .app{opacity:0;transform:translateY(16px);transition:opacity 1s ease,transform 1s cubic-bezier(.22,1,.36,1)}
  body.ouvert .hero .app{opacity:1;transform:none}
  body.ouvert .hero .app.a1{transition-delay:1.5s}
  body.ouvert .hero .app.a2{transition-delay:1.75s}
  body.ouvert .hero .app.a3{transition-delay:2.1s}
  body.ouvert .hero .app.a4{transition-delay:1.75s}
  body.ouvert .hero .app.a5{transition-delay:2.2s}

  .lustre{width:56px;height:64px;margin-bottom:.6rem;color:var(--or)}
  .sur-titre{
    font-family:'Pinyon Script',cursive;font-size:1.5rem;color:var(--or);line-height:1;
  }
  .date-hero{
    font-family:'Jost',sans-serif;font-weight:300;
    font-size:.95rem;letter-spacing:.45em;text-transform:uppercase;
    margin:.8rem 0 1.6rem;color:var(--encre);
  }
  .noms-hero{
    font-family:'Pinyon Script',cursive;font-weight:400;
    font-size:clamp(2.9rem,13vw,3.9rem);line-height:1.12;color:var(--encre);
    text-shadow:0 1px 0 rgba(255,255,255,.7);
  }
  .noms-hero .et{display:block;font-size:.45em;color:var(--or);line-height:.9}
  .defiler{
    margin-top:2.6rem;
    font-family:'Jost',sans-serif;font-weight:300;
    font-size:.68rem;letter-spacing:.4em;text-transform:uppercase;color:var(--encre-douce);
  }
  .defiler span{display:block;font-size:1rem;margin-top:.35rem;animation:descend 1.8s ease-in-out infinite}
  @keyframes descend{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(6px);opacity:1}}

  /* ================= SECTIONS ================= */
  .bloc{
    max-width:460px;margin:0 auto;text-align:center;
    padding:3.6rem 1.6rem;
    opacity:0;transform:translateY(22px);
    transition:opacity .9s ease,transform .9s cubic-bezier(.22,1,.36,1);
  }
  .bloc.vu{opacity:1;transform:none}
  .bloc .eyebrow{
    font-family:'Jost',sans-serif;font-weight:300;
    font-size:.66rem;letter-spacing:.42em;text-transform:uppercase;
    color:var(--encre-douce);margin-bottom:1rem;
  }
  .invite{font-style:italic;font-size:1.25rem;line-height:1.6;max-width:30ch;margin:0 auto}
  .filet{width:64px;height:1px;background:var(--or);position:relative;margin:0 auto}
  .filet::after{
    content:"❦";position:absolute;left:50%;top:50%;transform:translate(-50%,-52%);
    background:#f2e0c8;padding:0 .5rem;color:var(--or);font-size:.8rem;
  }
  .date-bloc{
    font-family:'Jost',sans-serif;font-weight:400;
    font-size:1rem;letter-spacing:.3em;text-transform:uppercase;
  }
  .date-bloc strong{font-weight:400;font-size:1.6em;letter-spacing:.15em;display:block;margin:.25rem 0}
  .horaire{font-size:1.1rem;font-style:italic;color:var(--encre-douce);margin-top:.6rem}
  .lieu{font-size:1.3rem;line-height:1.55}
  .mot{font-family:'Pinyon Script',cursive;font-size:1.7rem;color:var(--or);line-height:1.3}
  .fin{padding-bottom:5rem}
  .mini-medaillon{
    width:54px;height:54px;border-radius:50%;margin:1.6rem auto 0;
    border:1px solid var(--or-clair);
    display:flex;align-items:center;justify-content:center;
    font-family:'Pinyon Script',cursive;font-size:1.3rem;color:var(--or);
    background:rgba(253,247,236,.6);
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{transition-duration:.01ms!important;transition-delay:0ms!important;animation:none!important}
    .bloc{opacity:1;transform:none}
  }
</style>
</head>

<script>
  const voile = document.getElementById('voile');
  const env = document.getElementById('env');
  const sceau = document.getElementById('sceau');

  sceau.addEventListener('click', () => {
    env.classList.add('ouvrant');
    setTimeout(() => {
      voile.classList.add('parti');
      document.body.classList.add('ouvert');
    }, 500);
  }, { once:true });

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vu'); });
  }, { threshold:.25 });
  document.querySelectorAll('.bloc').forEach(b => obs.observe(b));
</script>
