<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Oussama &amp; Amna — 08.08.2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --blanc:#f8f6f2;
    --perle:#efeae1;
    --sable:#f4e7d6;
    --champagne:#eed9bf;
    --or:#c19a63;
    --or-clair:#d9bd93;
    --encre:#6d5a44;
    --encre-douce:#9a886f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    background:linear-gradient(180deg,#f7ecdd 0%,#efdcc4 60%,#ecd5b9 100%);
    font-family:'Cormorant Garamond',Georgia,serif;
    color:var(--encre);
    overflow:hidden;
  }
  body.ouvert{overflow:auto}
  body::after{ /* grain papier */
    content:"";position:fixed;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:multiply;z-index:90;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
  }

  /* ================= ENVELOPPE ================= */
  .voile{
    position:fixed;inset:0;z-index:100;background:var(--blanc);
    display:flex;align-items:center;justify-content:center;
    transition:opacity .9s ease 1.15s;
  }
  .voile.parti{opacity:0;pointer-events:none;visibility:hidden;transition:opacity .9s ease, visibility 0s .95s}
  .env{position:relative;width:min(100vw,460px);height:min(100vh,720px);height:min(100dvh,720px);perspective:1300px}

  .rabat{
    position:absolute;inset:0;
    transition:transform 1.1s cubic-bezier(.6,.05,.3,1), opacity .5s ease .85s;
    backface-visibility:hidden;
  }
  .rabat.haut{clip-path:polygon(0 0,100% 0,50% 52%);transform-origin:top;
    background:linear-gradient(180deg,#fcfbf8 0%,#eeeae2 100%);
    filter:drop-shadow(0 3px 4px rgba(109,90,68,.10));}
  .rabat.bas{clip-path:polygon(0 100%,100% 100%,50% 48%);transform-origin:bottom;
    background:linear-gradient(0deg,#faf8f4 0%,#eae5db 100%);}
  .rabat.gauche{clip-path:polygon(0 0,0 100%,52% 50%);transform-origin:left;
    background:linear-gradient(90deg,#fbfaf6 0%,#ece7de 100%);}
  .rabat.droite{clip-path:polygon(100% 0,100% 100%,48% 50%);transform-origin:right;
    background:linear-gradient(270deg,#fbfaf6 0%,#ece7de 100%);}

  .ouvrant .rabat.haut{transform:rotateX(180deg);opacity:0;transition-delay:.25s}
  .ouvrant .rabat.bas{transform:rotateX(-180deg);opacity:0;transition-delay:.3s}
  .ouvrant .rabat.gauche{transform:rotateY(-180deg);opacity:0;transition-delay:.4s}
  .ouvrant .rabat.droite{transform:rotateY(180deg);opacity:0;transition-delay:.4s}

  /* rubans de dentelle */
  .dentelle{
    position:absolute;left:50%;top:50%;
    width:190%;height:40px;
    transform:translate(-50%,-50%) rotate(57deg);
    z-index:2;pointer-events:none;
    background:
      radial-gradient(circle at 3px 3px, rgba(255,255,255,.95) 1.2px, transparent 1.8px) 0 0/7px 7px,
      radial-gradient(circle at 6px 6px, rgba(255,255,255,.8) 1px, transparent 1.5px) 3px 3px/9px 9px,
      rgba(255,255,255,.5);
    box-shadow:0 1px 3px rgba(109,90,68,.08);
    -webkit-mask:
      radial-gradient(circle at 7px 7px, #000 6px, transparent 6.6px) top left/14px 14px repeat-x,
      radial-gradient(circle at 7px 7px, #000 6px, transparent 6.6px) bottom left/14px 14px repeat-x,
      linear-gradient(#000,#000) 0 50%/100% calc(100% - 16px) no-repeat;
    mask:
      radial-gradient(circle at 7px 7px, #000 6px, transparent 6.6px) top left/14px 14px repeat-x,
      radial-gradient(circle at 7px 7px, #000 6px, transparent 6.6px) bottom left/14px 14px repeat-x,
      linear-gradient(#000,#000) 0 50%/100% calc(100% - 16px) no-repeat;
    transition:opacity .45s ease;
  }
  .dentelle.d2{transform:translate(-50%,-50%) rotate(-57deg)}
  .ouvrant .dentelle{opacity:0}

  /* médaillon perlé */
  .sceau{
    position:absolute;left:50%;top:50%;
    width:172px;height:172px;
    transform:translate(-50%,-50%);
    border:none;cursor:pointer;background:transparent;
    z-index:5;
    transition:transform .8s cubic-bezier(.6,.05,.3,1),opacity .55s ease .05s;
  }
  .ouvrant .sceau{transform:translate(-50%,-50%) scale(1.2);opacity:0;pointer-events:none}
  .sceau svg{width:100%;height:100%;overflow:visible}
  .sceau:focus-visible{outline:2px solid var(--or);outline-offset:8px;border-radius:50%}
  .lettreO{font-family:'Cormorant Garamond',serif;font-weight:500}
  .lettreA{font-family:'Pinyon Script',cursive}

  .hint{
    position:absolute;left:50%;bottom:10%;transform:translateX(-50%);
    font-family:'Jost',sans-serif;font-weight:300;
    font-size:.72rem;letter-spacing:.35em;text-transform:uppercase;
    color:var(--encre-douce);white-space:nowrap;z-index:5;
    animation:pulse 2.6s ease-in-out infinite;
    transition:opacity .4s ease;
  }
  .ouvrant .hint{opacity:0}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

  /* ================= HERO ARCHE ================= */
  .hero{
    min-height:100vh;min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    position:relative;padding:6vh 1.2rem 4vh;
  }
  .etoile{
    position:absolute;color:var(--or);opacity:0;font-size:.8rem;
    animation:scintille 3.4s ease-in-out infinite;
  }
  body.ouvert .etoile{opacity:.5}
  .etoile.e1{top:14%;left:14%;animation-delay:.4s}
  .etoile.e2{top:22%;right:12%;animation-delay:1.5s;font-size:.6rem}
  .etoile.e3{bottom:18%;left:18%;animation-delay:2.3s;font-size:.65rem}
  .etoile.e4{bottom:26%;right:16%;animation-delay:.9s}
  @keyframes scintille{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:.6;transform:scale(1.1)}}

  .arche{
    position:relative;
    width:min(82vw,330px);
    min-height:min(74vh,560px);
    border-radius:165px 165px 14px 14px;
    background:radial-gradient(ellipse at 50% 22%, #fdf7ec 0%, #f6e6cf 62%, #f0dcc0 100%);
    box-shadow:
      0 0 0 5px rgba(253,247,236,.8),
      0 0 0 6px var(--or-clair),
      0 0 0 12px rgba(253,247,236,.55),
      0 0 0 13px rgba(193,154,99,.55),
      0 34px 60px -28px rgba(109,90,68,.5);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:4.6rem 1.4rem 2.6rem;
  }
  .hero .app{opacity:0;transform:translateY(16px);transition:opacity 1s ease,transform 1s cubic-bezier(.22,1,.36,1)}
  body.ouvert .hero .app{opacity:1;transform:none}
  body.ouvert .hero .app.a1{transition-delay:.9s}
  body.ouvert .hero .app.a2{transition-delay:1.15s}
  body.ouvert .hero .app.a3{transition-delay:1.4s}
  body.ouvert .hero .app.a4{transition-delay:1.75s}
  body.ouvert .hero .app.a5{transition-delay:2.2s}

  .lustre{width:56px;height:64px;margin-bottom:.6rem;color:var(--or)}
  .sur-titre{
    font-family:'Pinyon Script',cursive;font-size:1.5rem;color:var(--or);line-height:1;
  }
  .date-hero{
    font-family:'Jost',sans-serif;font-weight:300;
    font-size:.95rem;letter-spacing:.45em;text-transform:uppercase;
    margin:.8rem 0 1.6rem;color:var(--encre);
  }
  .noms-hero{
    font-family:'Pinyon Script',cursive;font-weight:400;
    font-size:clamp(2.9rem,13vw,3.9rem);line-height:1.12;color:var(--encre);
    text-shadow:0 1px 0 rgba(255,255,255,.7);
  }
  .noms-hero .et{display:block;font-size:.45em;color:var(--or);line-height:.9}
  .defiler{
    margin-top:2.6rem;
    font-family:'Jost',sans-serif;font-weight:300;
    font-size:.68rem;letter-spacing:.4em;text-transform:uppercase;color:var(--encre-douce);
  }
  .defiler span{display:block;font-size:1rem;margin-top:.35rem;animation:descend 1.8s ease-in-out infinite}
  @keyframes descend{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(6px);opacity:1}}

  /* ================= SECTIONS ================= */
  .bloc{
    max-width:460px;margin:0 auto;text-align:center;
    padding:3.6rem 1.6rem;
    opacity:0;transform:translateY(22px);
    transition:opacity .9s ease,transform .9s cubic-bezier(.22,1,.36,1);
  }
  .bloc.vu{opacity:1;transform:none}
  .bloc .eyebrow{
    font-family:'Jost',sans-serif;font-weight:300;
    font-size:.66rem;letter-spacing:.42em;text-transform:uppercase;
    color:var(--encre-douce);margin-bottom:1rem;
  }
  .invite{font-style:italic;font-size:1.25rem;line-height:1.6;max-width:30ch;margin:0 auto}
  .filet{width:64px;height:1px;background:var(--or);position:relative;margin:0 auto}
  .filet::after{
    content:"❦";position:absolute;left:50%;top:50%;transform:translate(-50%,-52%);
    background:#f2e0c8;padding:0 .5rem;color:var(--or);font-size:.8rem;
  }
  .date-bloc{
    font-family:'Jost',sans-serif;font-weight:400;
    font-size:1rem;letter-spacing:.3em;text-transform:uppercase;
  }
  .date-bloc strong{font-weight:400;font-size:1.6em;letter-spacing:.15em;display:block;margin:.25rem 0}
  .horaire{font-size:1.1rem;font-style:italic;color:var(--encre-douce);margin-top:.6rem}
  .lieu{font-size:1.3rem;line-height:1.55}
  .mot{font-family:'Pinyon Script',cursive;font-size:1.7rem;color:var(--or);line-height:1.3}
  .fin{padding-bottom:5rem}
  .mini-medaillon{
    width:54px;height:54px;border-radius:50%;margin:1.6rem auto 0;
    border:1px solid var(--or-clair);
    display:flex;align-items:center;justify-content:center;
    font-family:'Pinyon Script',cursive;font-size:1.3rem;color:var(--or);
    background:rgba(253,247,236,.6);
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{transition-duration:.01ms!important;transition-delay:0ms!important;animation:none!important}
    .bloc{opacity:1;transform:none}
  }
</style>
</head>
<body>

  <!-- ENVELOPPE -->
  <div class="voile" id="voile">
    <div class="env" id="env">
      <div class="rabat bas"></div>
      <div class="rabat gauche"></div>
      <div class="rabat droite"></div>
      <div class="rabat haut"></div>
      <div class="dentelle"></div>
      <div class="dentelle d2"></div>

      <button class="sceau" id="sceau" aria-label="Ouvrir l’invitation">
        <svg viewBox="0 0 172 172" aria-hidden="true">
          <circle cx="86" cy="87.5" r="80" fill="rgba(109,90,68,.12)"/>
          <circle cx="86" cy="86" r="80" fill="#efe9df"/>
          <!-- couronne de perles -->
          <circle cx="86" cy="87.4" r="70" fill="none" stroke="rgba(109,90,68,.30)"
                  stroke-width="11" stroke-linecap="round" stroke-dasharray="0.1 15.6"/>
          <circle cx="86" cy="86" r="70" fill="none" stroke="#f7f2e9"
                  stroke-width="11" stroke-linecap="round" stroke-dasharray="0.1 15.6"/>
          <circle cx="84.8" cy="84.8" r="70" fill="none" stroke="rgba(255,255,255,.95)"
                  stroke-width="4" stroke-linecap="round" stroke-dasharray="0.1 15.6"/>
          <!-- disque central -->
          <circle cx="86" cy="86" r="55" fill="rgba(250,246,239,.92)"/>
          <circle cx="86" cy="86" r="55" fill="none" stroke="var(--or-clair)" stroke-width="1"/>
          <circle cx="86" cy="86" r="51" fill="none" stroke="rgba(193,154,99,.35)" stroke-width="0.7"/>
          <!-- monogramme -->
          <text x="72" y="96" text-anchor="middle" class="lettreO" font-size="58" fill="#d8c9b2">O</text>
          <text x="99" y="112" text-anchor="middle" class="lettreA" font-size="62" fill="#ffffff"
                style="text-shadow:0 1px 2px rgba(109,90,68,.25)">A</text>
        </svg>
      </button>

      <p class="hint">Touchez le médaillon</p>
    </div>
  </div>

  <!-- PAGE -->
  <main>
    <section class="hero">
      <span class="etoile e1">✦</span><span class="etoile e2">✦</span>
      <span class="etoile e3">✦</span><span class="etoile e4">✦</span>
      <div class="arche">
        <svg class="lustre app a1" viewBox="0 0 60 68" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round">
          <line x1="30" y1="0" x2="30" y2="12"/>
          <path d="M12,20 Q30,34 48,20"/>
          <circle cx="12" cy="20" r="1.6" fill="currentColor" stroke="none"/>
          <circle cx="48" cy="20" r="1.6" fill="currentColor" stroke="none"/>
          <circle cx="30" cy="27" r="1.6" fill="currentColor" stroke="none"/>
          <line x1="12" y1="22" x2="12" y2="30"/><circle cx="12" cy="32.5" r="1.3" fill="currentColor" stroke="none"/>
          <line x1="48" y1="22" x2="48" y2="30"/><circle cx="48" cy="32.5" r="1.3" fill="currentColor" stroke="none"/>
          <line x1="30" y1="29" x2="30" y2="40"/><circle cx="30" cy="42.8" r="1.5" fill="currentColor" stroke="none"/>
          <path d="M20,46 Q30,54 40,46"/>
          <line x1="30" y1="50" x2="30" y2="58"/><circle cx="30" cy="60.5" r="1.3" fill="currentColor" stroke="none"/>
        </svg>
        <h1 class="noms-hero app a2">Oussama<span class="et">&amp;</span>Amna</h1>
        <p class="defiler app a3">Faites défiler<span>↓</span></p>
      </div>
    </section>

    <section class="bloc">
      <p class="eyebrow">Invitation</p>
      <p class="invite">Nous avons l’immense joie de vous convier à la célébration de notre union</p>
    </section>

    <div class="bloc" style="padding:0"><div class="filet" role="presentation"></div></div>

    <section class="bloc">
      <p class="eyebrow">Quand</p>
      <p class="date-bloc">Samedi<strong>08 · 08 · 2026</strong>Août</p>
      <p class="horaire">de 15 h à 19 h</p>
    </section>

    <section class="bloc">
      <p class="eyebrow">Où</p>
      <p class="lieu">Salle des fêtes Versailles<br>Hammam Sousse</p>
    </section>

    <section class="bloc fin">
      <p class="mot">Votre présence sera<br>notre plus beau cadeau</p>
      <div class="mini-medaillon">OA</div>
    </section>
  </main>

<script>
  const voile = document.getElementById('voile');
  const env = document.getElementById('env');
  const sceau = document.getElementById('sceau');

  sceau.addEventListener('click', () => {
    env.classList.add('ouvrant');
    setTimeout(() => {
      voile.classList.add('parti');
      document.body.classList.add('ouvert');
    }, 1350);
  }, { once:true });

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vu'); });
  }, { threshold:.25 });
  document.querySelectorAll('.bloc').forEach(b => obs.observe(b));
</script>
</body>
</html>
